name: Python Chatbot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest   # ✅ REQUIRED

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Set up Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3. Install dependencies
    - name: Install dependencies
      run: |
        cd pythonchatbot
        pip install -r requirements.txt

    # 4. Run app
    - name: Run chatbot
      run: |
        cd pythonchatbot
        python simple_chatbot.py &
        sleep 5

    # 5. Build Docker image
    - name: Build Docker
      run: |
        cd pythonchatbot
        docker build -t python-chatbot .

    # 6. Login to Docker Hub
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Tag image
    - name: Tag Docker image
      run: docker tag python-chatbot ${{ secrets.DOCKER_USERNAME }}/python-chatbot

    # 8. Push image
    - name: Push Docker image
  run: docker push ${{ secrets.DOCKER_USERNAME }}/python-chatbot